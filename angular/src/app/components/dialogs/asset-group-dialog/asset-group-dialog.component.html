<div class="container">
  <div mat-dialog-content>
    <mat-accordion class="example-headers-align">
      <mat-expansion-panel [expanded]="true">
        <mat-expansion-panel-header>
          <mat-panel-title>
            Existing Group
          </mat-panel-title>
          <mat-panel-description>
            Add assets to a saved group
            <mat-icon>workspaces</mat-icon>
          </mat-panel-description>
        </mat-expansion-panel-header>

        <div>
          <mat-form-field appearance="fill">
            <mat-label>Groups</mat-label>
            <mat-select [(ngModel)]="groupName" (selectionChange)="selectExistingGroup()">
              <mat-option *ngFor="let group of (ownAssetGroups$ | async)"
                          class="group-name" [value]="group.group_name">{{group.group_name}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </mat-expansion-panel>

      <mat-expansion-panel (opened)="openNewGroupPanel()">
        <mat-expansion-panel-header>
          <mat-panel-title>
            New Group
          </mat-panel-title>
          <mat-panel-description>
            Create new group
            <mat-icon>add_box</mat-icon>
          </mat-panel-description>
        </mat-expansion-panel-header>

        <div class="new-group">
          <mat-form-field appearance="outline">
            <mat-label>Group Name</mat-label>
            <input (change)="markNameUnsaved()" matInput placeholder="Butterflies" [(ngModel)]="groupName">
          </mat-form-field>

          <div *ngIf="(filteredKeycloakUsers$ | async) as users">
            <mat-form-field appearance="outline">
              <mat-label>Search users</mat-label>
              <input matInput type="text" [formControl]="digitiserSearch" autocomplete="off">
            </mat-form-field>

            <mat-form-field appearance="fill">
              <mat-label>Digitisers</mat-label>
              <mat-select [multiple]="true" [formControl]="digitiserFormControl">
                <mat-option *ngFor="let user of users" [value]="user.username">{{user.username}}</mat-option>
              </mat-select>
            </mat-form-field>
          </div>
        </div>
      </mat-expansion-panel>
    </mat-accordion>
  </div>

  <div mat-dialog-actions>
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-stroked-button (click)="save()">Save</button>
  </div>
</div>
