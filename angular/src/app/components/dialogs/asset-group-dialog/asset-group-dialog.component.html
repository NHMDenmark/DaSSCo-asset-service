<div class="asset-group-dialog">
  <div class="dialog-header">
    <div>
      <h1 mat-dialog-title>{{ dialogTitle() }}</h1>
      <p>{{ dialogDescription() }}</p>
    </div>
  </div>

  <div mat-dialog-content class="dialog-content">
    <mat-button-toggle-group
      *ngIf="!isCreateGroupAction()"
      class="mode-toggle"
      [value]="mode"
      aria-label="Choose asset group action"
      (change)="selectMode($event.value)">
      <mat-button-toggle value="existing">
        <mat-icon>workspaces</mat-icon>
        Existing group
      </mat-button-toggle>
      <mat-button-toggle value="new">
        <mat-icon>add_box</mat-icon>
        New group
      </mat-button-toggle>
    </mat-button-toggle-group>

    <section *ngIf="!isCreateGroupAction() && mode === 'existing'" class="field-stack">
      <mat-form-field appearance="outline">
        <mat-label>Groups</mat-label>
        <mat-select [value]="selectedExistingGroup" (selectionChange)="selectExistingGroup($event.value)">
          <mat-option *ngFor="let group of ownAssetGroups$ | async" [value]="group">
            {{ group.group_name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </section>

    <section *ngIf="mode === 'new'" class="field-stack">
      <mat-form-field appearance="outline">
        <mat-label>Group name</mat-label>
        <input matInput placeholder="Butterflies" [(ngModel)]="groupName" />
      </mat-form-field>

      <div *ngIf="username$ | async as username">
        <dassco-digitiser-list
          label="Share with digitisers"
          ariaLabel="Share with digitisers"
          optionsId="asset-group-dialog-digitiser-options"
          [selectedUsersControl]="digitiserFormControl"
          [excludedUsernames]="[username]"></dassco-digitiser-list>
      </div>
    </section>
  </div>

  <div mat-dialog-actions class="dialog-actions">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" [disabled]="!canSave()" (click)="save()">Save</button>
  </div>
</div>
