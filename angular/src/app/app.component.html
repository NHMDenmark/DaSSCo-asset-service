<div class="container" *ngIf="(authService.loginInitialized | async) !== undefined">
  <mat-toolbar>
    <img
      style="height: 100%; padding: 0.5rem"
      src="assets/DaSSCo_logo_blue.svg"
      alt="Dassco Logo"
      (click)="navigateToSite('statistics')" />
    <div class="button-container">
      <ng-container *ngIf="authService.isAuthenticated$ | async;">
        <div class="navigation-menu" *ngIf="activeMenu | async; let active">
          <button
            mat-button
            (click)="navigateToSite('statistics')"
            [ngStyle]="active === 'statistics' ? {color: 'rgba(20, 48, 82, 0.9)'} : {}">
            Statistics
          </button>
          <button
            mat-button
            (click)="navigateToSite('queries')"
            [ngStyle]="active === 'queries' ? {color: 'rgba(20, 48, 82, 0.9)'} : {}">
            Queries
          </button>
          <button
            mat-button
            (click)="navigateToSite('docs')"
            [ngStyle]="active === 'docs' ? {color: 'rgba(20, 48, 82, 0.9)'} : {}">
            Docs
          </button>
        </div>
      </ng-container>


      <a style="margin-left: auto" [href]="dasscoHomepage" target="_blank" mat-button>
        {{ dasscoHomepage | linkTrim | titlecase }}
      </a>
      <button
        *ngIf="authService.isAuthenticated$ | async; else showLoginButton"
        mat-button
        aria-label="Sign out"
        class="logout-btn"
        (click)="authService.logout()">
        Log out
        <mat-icon>logout</mat-icon>
      </button>
      <ng-template #showLoginButton>
        <button mat-button (click)="login()">Log in</button>
      </ng-template>
    </div>
  </mat-toolbar>
  <router-outlet></router-outlet>
  <dassco-asset-bundle-download-status></dassco-asset-bundle-download-status>
</div>
